<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Feeding Payment</title>
   <link rel="icon" href="images1/iconss/sbeclogo.png" type="image/png">
<script src="https://unpkg.com/tesseract.js@2.1.5/dist/tesseract.min.js"></script>
      
<h1 id="loadding-screen">
  
  <span id="one">H</span>
  <span id="two">E</span>
  <span id="three">L</span>
  <span id="four">L</span>
  <span id="five">O</span>
   <div class="all" style="margin-left: 8px;"></div>
  <span id="six">F</span>
  <span id="seven">O</span>
  <span id="eight">O</span>
  <span id="nine">D</span>
    <div class="all" style="margin-left: 8px;"></div>
  <span id="ten">A</span>
  <span id="eleven">D</span>
  <span id="twelive">M</span>
<span id="thirteen">I</span>
  <span id="forteen">N</span>
  <span id="fifteen">'</span>
    <span id="fifteen">S</span>
</h1>

<style>

  .headd{
    position: absolute;
    top:100px;
    align-items: center;
justify-content: center;
  }
  #loadding-screen {
    position: fixed;
    top: 0; bottom: 0; left:0; right: 0;
    display: flex;
    align-items: center;
    justify-content: center;
margin-bottom: 300px;
    margin-top: 0;
    color: rgb(0, 0, 0);
    font-size: 2.8rem;
    gap: 6px;
    z-index: 88;
  }


  #loadding-screen .all { width: 18px; display:inline-block; }

  #loadding-screen span {
    display: inline-block;
    animation: ripple 1.6s ease-in infinite;
    animation-fill-mode: both; 
    color: #000;
  }

  #loadding-screen span:nth-of-type(1){ animation-delay: 0s; }
  #loadding-screen span:nth-of-type(2){ animation-delay: 0.1s; }
  #loadding-screen span:nth-of-type(3){ animation-delay: 0.2s; }
  #loadding-screen span:nth-of-type(4){ animation-delay: 0.3s; }
  #loadding-screen span:nth-of-type(5){ animation-delay: 0.4s; }
  #loadding-screen span:nth-of-type(6){ animation-delay: 0.5s; }
  #loadding-screen span:nth-of-type(7){ animation-delay: 0.6s; }
  #loadding-screen span:nth-of-type(8){ animation-delay: 0.7s; }
  #loadding-screen span:nth-of-type(9){ animation-delay: 0.8s; }
  #loadding-screen span:nth-of-type(10){ animation-delay: 0.9s; }
  #loadding-screen span:nth-of-type(11){ animation-delay: 1s; }
  #loadding-screen span:nth-of-type(12){ animation-delay: 1.1s; }
  #loadding-screen span:nth-of-type(13){ animation-delay: 1.2s; }
  #loadding-screen span:nth-of-type(14){ animation-delay: 1.3s; }
  #loadding-screen span:nth-of-type(15){ animation-delay: 1.4s; }
  #loadding-screen span:nth-of-type(16){ animation-delay: 1.5s; }

  /* fixed keyframes: start/end at rest, peak in middle; color stops preserved-ish */
  @keyframes ripple {
    0% {
      transform: translateY(1) scale(1.5);
      color: rgb(0, 0, 0);
    }
    20% {
      transform: translateY(-10px) scale(1.08);
      color: rgb(0, 0, 0);
    }
    40% {
      transform: translateY(0) scale(1.5);
      color: rgb(0, 0, 0);
    }
    60% {
      transform: translateY(-8px) scale(1.04);
      color: rgb(0, 0, 0);
    }
    80% {
      transform: translateY(0) scale(1);
      color: rgb(0, 0, 0);
    }
    100% {
      transform: translateY(0) scale(1);
      color: rgb(0, 0, 0);
    }
  }@media(max-width: 550px){
    #loadding-screen{
      font-size: 20px;
      margin-bottom: 500px;
      bottom: 0;
    }h1 span{
      margin-top: -250px;

    }

  }


  :root{
    --bg:#f6f3f3;
    --black:#000;
    --white:#fff;
  }

  *{
    box-sizing:border-box;
  }

  body{
    background-color:antiquewhite;
    margin:0;
    font-family:Roboto, Arial, sans-serif;
    background:var(--bg);
    background-color:antiquewhite;  color: #000000;
  }

  .container{
    min-height:90vh;
    display:flex;
    flex-direction:column;
    justify-content:space-between;
    align-items:center;
    padding:60px;
  }

  /* Top Section */
  .top{
    text-align:center;
  }

  .top h1{
    font-size:34px;
    margin:0px 0;
  }

  .top img{
    width:180px;
    margin-top:10px;
  }

  /* Controls */
  .controls{
    width:70%;
    display:flex;
    justify-content:space-between;
    align-items:center;
    gap:50px;
    padding:40px 0;
        transition: scale 0.15s ease;
  }

  button{
    background:var(--black);
    color:var(--white);
    border:none;
    padding:14px 15px;
    border-radius:16px;
    cursor:pointer;
    font-weight:600;
    color: #050404;
    min-width:120px;
    background-color: rgb(255, 255, 255);
    border-bottom: 5px solid rgb(6, 255, 255);
    transition: scale 0.15s ease;
    font-size: 18px;

  }button:active{
   scale: calc(0.8);
  }

  #bulk-image-input{
    flex:1;
    height:55px;
    background:#000000;
    color:#ffffff;
    border:none;
    border-radius:12px;
    padding:10px;
        transition: scale 0.15s ease;
        border: 2px solid rgb(6, 255, 255);
  font-size: 18px;
  }





  



  /* -------- PHONE VERSION -------- */
  @media (max-width:768px){

    .controls{
      flex-direction:column;

    }

    button{
      width:80%;
      
    }

    #bulk-image-input{
     
   height: 80%;
    }

    .top h1{
      font-size:20px;
    }

    .top img{
      width:90px;
    }
   
 
  }

</style>
</head>

<body>

<div class="container">

  <div class="top">
    <h1>Feeding Payment</h1>
    <img src="images1/iconss/sbeclogo.png" alt="logo">
  </div>

  <div class="controls">
    <button id="print-all-btn">Coupons</button>

    <input id="bulk-image-input" type="file" accept="image/*" multiple>
 <button onclick="processBulkImageUpload()">File</button>
<a href="user.html"><button id="export-users-csv">Users Info</button></a>
  </div>

</div>

<script type="module" src="cart/order.js"></script>

</body>
</html>
